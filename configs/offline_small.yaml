# Offline monitor study — small / fast iteration config.
name: offline_small
dataset: data/processed/prefix_offline_small.parquet
seed: 42

split:
  regime: instance        # instance | repo | model
  test_size: 0.2
  val_size: 0.2

models:
  - baseline_majority
  - baseline_step_count_only
  - heuristic_rule_monitor
  - logistic_regression
  - random_forest
  - hist_gradient_boosting
  - structured_plus_tfidf_logistic

# Feature ablation sets (Table 2). Each entry is a list of feature families.
ablation_families:
  - [step_count_only]
  - [length_pace]
  - [action_counts]
  - [context_before_edit]
  - [file_behavior]
  - [testing_behavior]
  - [loop_behavior]
  - [all_structured]
  - [all_structured_plus_text]

text_max_features: 50000
calibration: isotonic       # platt | isotonic | none
threshold_far_targets: [0.20, 0.10, 0.05]
bootstrap: 300

results_dir: results/offline/small
models_dir: models/monitor/small
calibrators_dir: models/calibrators/small
