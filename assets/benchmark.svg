<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" font-family="'Geist','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,system-ui,sans-serif" role="img" aria-label="Bar chart: at predicting which AI coding-agent runs will fail, a 1.14 MB CPU model scores ROC AUC 0.768 on 200 held-out runs, beating Claude Opus 4.8 (0.639), GPT-5.5 (0.626), and a local 7B model (0.559). The frontier models are judged zero-shot from one shared prompt; the small model is trained for this single task. It is about 10,000 times cheaper to run, 1.14 MB on disk, and runs on a laptop CPU for free."><defs><linearGradient id="fade" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#e4e4e6" stop-opacity="0"/><stop offset="0.5" stop-color="#e4e4e6" stop-opacity="1"/><stop offset="1" stop-color="#e4e4e6" stop-opacity="0"/></linearGradient></defs><rect x="0" y="0" width="1600" height="900" fill="#ffffff"/><rect x="64" y="54" width="8" height="8" fill="#00e4b4"/><text x="82.0" y="62.0" font-family="'Geist','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,system-ui,sans-serif" font-size="13" font-weight="700" fill="#0a8f76" text-anchor="start" letter-spacing="1.20">HOLD YOUR FIRE · FAILURE-PREDICTION BENCHMARK</text><text x="64.0" y="116.0" font-family="'Geist','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,system-ui,sans-serif" font-size="37" font-weight="360" fill="#0a0a0a" text-anchor="start">A 1 MB model out-predicts GPT-5.5 and Claude Opus 4.8</text><text x="64.0" y="160.0" font-family="'Geist','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,system-ui,sans-serif" font-size="37" font-weight="360" fill="#0a0a0a" text-anchor="start">at spotting failing AI coding-agent runs</text><text x="64.0" y="198.0" font-family="'Geist','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,system-ui,sans-serif" font-size="17" font-weight="400" fill="#5c5c60" text-anchor="start">Predicting which agent runs will eventually fail. Higher bar = better (ROC AUC, on the same 200 held-out runs).</text><text x="64.0" y="223.0" font-family="'Geist','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,system-ui,sans-serif" font-size="17" font-weight="400" fill="#5c5c60" text-anchor="start">The frontier models judge zero-shot from one shared prompt; the 1 MB model is trained for this one job.</text><line x1="64.0" y1="250.0" x2="1536.0" y2="250.0" stroke="url(#fade)" stroke-width="1"/><text x="132.0" y="318.0" font-family="'Geist','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,system-ui,sans-serif" font-size="11" font-weight="600" fill="#8a8a90" text-anchor="end" letter-spacing="0.50">ROC AUC</text><line x1="150.0" y1="652.0" x2="928.0" y2="652.0" stroke="#5c5c60" stroke-width="1.2" opacity="1"/><text x="138.0" y="656.0" font-family="'Geist Mono','SF Mono',ui-monospace,'JetBrains Mono','Roboto Mono',Menlo,Consolas,monospace" font-size="12" font-weight="500" fill="#8a8a90" text-anchor="end">0.5</text><line x1="150.0" y1="545.3" x2="928.0" y2="545.3" stroke="#e4e4e6" stroke-width="1" opacity="0.7"/><text x="138.0" y="549.3" font-family="'Geist Mono','SF Mono',ui-monospace,'JetBrains Mono','Roboto Mono',Menlo,Consolas,monospace" font-size="12" font-weight="500" fill="#8a8a90" text-anchor="end">0.6</text><line x1="150.0" y1="438.7" x2="928.0" y2="438.7" stroke="#e4e4e6" stroke-width="1" opacity="0.7"/><text x="138.0" y="442.7" font-family="'Geist Mono','SF Mono',ui-monospace,'JetBrains Mono','Roboto Mono',Menlo,Consolas,monospace" font-size="12" font-weight="500" fill="#8a8a90" text-anchor="end">0.7</text><line x1="150.0" y1="332.0" x2="928.0" y2="332.0" stroke="#e4e4e6" stroke-width="1" opacity="0.7"/><text x="138.0" y="336.0" font-family="'Geist Mono','SF Mono',ui-monospace,'JetBrains Mono','Roboto Mono',Menlo,Consolas,monospace" font-size="12" font-weight="500" fill="#8a8a90" text-anchor="end">0.8</text><text x="138.0" y="671.0" font-family="'Geist','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,system-ui,sans-serif" font-size="10" font-weight="500" fill="#8a8a90" text-anchor="end">chance</text><rect x="168.0" y="366.1" width="122.0" height="285.9" rx="5" fill="#00e4b4"/><rect x="168.0" y="366.1" width="122.0" height="285.9" rx="5" stroke="#0a8f76" stroke-width="1.4" fill="none"/><text x="229.0" y="352.1" font-family="'Geist Mono','SF Mono',ui-monospace,'JetBrains Mono','Roboto Mono',Menlo,Consolas,monospace" font-size="27" font-weight="700" fill="#0a6b58" text-anchor="middle">0.768</text><text x="229.0" y="684.0" font-family="'Geist','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,system-ui,sans-serif" font-size="17" font-weight="700" fill="#0a0a0a" text-anchor="middle">Hold Your Fire</text><text x="229.0" y="704.0" font-family="'Geist','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,system-ui,sans-serif" font-size="12.5" font-weight="500" fill="#0a8f76" text-anchor="middle">1.14 MB · CPU</text><rect x="380.7" y="503.7" width="122.0" height="148.3" rx="5" fill="#cccdd3"/><text x="441.7" y="489.7" font-family="'Geist Mono','SF Mono',ui-monospace,'JetBrains Mono','Roboto Mono',Menlo,Consolas,monospace" font-size="27" font-weight="700" fill="#9a9aa2" text-anchor="middle">0.639</text><text x="441.7" y="684.0" font-family="'Geist','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,system-ui,sans-serif" font-size="17" font-weight="700" fill="#2c2c2e" text-anchor="middle">Claude Opus 4.8</text><text x="441.7" y="704.0" font-family="'Geist','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,system-ui,sans-serif" font-size="12.5" font-weight="500" fill="#8a8a90" text-anchor="middle">frontier · API</text><rect x="593.3" y="517.6" width="122.0" height="134.4" rx="5" fill="#cccdd3"/><text x="654.3" y="503.6" font-family="'Geist Mono','SF Mono',ui-monospace,'JetBrains Mono','Roboto Mono',Menlo,Consolas,monospace" font-size="27" font-weight="700" fill="#9a9aa2" text-anchor="middle">0.626</text><text x="654.3" y="684.0" font-family="'Geist','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,system-ui,sans-serif" font-size="17" font-weight="700" fill="#2c2c2e" text-anchor="middle">GPT-5.5</text><text x="654.3" y="704.0" font-family="'Geist','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,system-ui,sans-serif" font-size="12.5" font-weight="500" fill="#8a8a90" text-anchor="middle">frontier · API</text><rect x="806.0" y="589.1" width="122.0" height="62.9" rx="5" fill="#cccdd3"/><text x="867.0" y="575.1" font-family="'Geist Mono','SF Mono',ui-monospace,'JetBrains Mono','Roboto Mono',Menlo,Consolas,monospace" font-size="27" font-weight="700" fill="#9a9aa2" text-anchor="middle">0.559</text><text x="867.0" y="684.0" font-family="'Geist','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,system-ui,sans-serif" font-size="17" font-weight="700" fill="#2c2c2e" text-anchor="middle">qwen2.5-coder 7B</text><text x="867.0" y="704.0" font-family="'Geist','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,system-ui,sans-serif" font-size="12.5" font-weight="500" fill="#8a8a90" text-anchor="middle">local</text><rect x="1012.0" y="300.0" width="524.0" height="352.0" rx="18" stroke="#9be8d5" stroke-width="1" fill="#ecfbf6"/><text x="1042.0" y="340.0" font-family="'Geist','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,system-ui,sans-serif" font-size="15" font-weight="700" fill="#0a8f76" text-anchor="start" letter-spacing="0.80">AND YET IT IS TINY AND FREE</text><text x="1042.0" y="392.0" font-family="'Geist','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,system-ui,sans-serif" font-size="33" font-weight="700" fill="#0a0a0a" text-anchor="start">1.14 MB</text><text x="1242.0" y="392.0" font-family="'Geist','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,system-ui,sans-serif" font-size="14.5" font-weight="400" fill="#5c5c60" text-anchor="start">on disk — versus gigabytes of weights</text><text x="1042.0" y="462.0" font-family="'Geist','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,system-ui,sans-serif" font-size="33" font-weight="700" fill="#0a0a0a" text-anchor="start">≈10,000×</text><text x="1242.0" y="462.0" font-family="'Geist','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,system-ui,sans-serif" font-size="14.5" font-weight="400" fill="#5c5c60" text-anchor="start">cheaper per prediction, batched</text><text x="1042.0" y="532.0" font-family="'Geist','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,system-ui,sans-serif" font-size="33" font-weight="700" fill="#0a0a0a" text-anchor="start">$0 · CPU</text><text x="1242.0" y="532.0" font-family="'Geist','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,system-ui,sans-serif" font-size="14.5" font-weight="400" fill="#5c5c60" text-anchor="start">no GPU, no API, runs on a laptop</text><line x1="1042.0" y1="590.0" x2="1506.0" y2="590.0" stroke="#9be8d5" stroke-width="1"/><text x="1042.0" y="622.0" font-family="'Geist','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,system-ui,sans-serif" font-size="14" font-weight="500" fill="#2c2c2e" text-anchor="start">Flags a failing run ~13 steps early, and calibrated (ECE 0.011).</text><line x1="64.0" y1="792.0" x2="1536.0" y2="792.0" stroke="url(#fade)" stroke-width="1"/><text x="64.0" y="818.0" font-family="'Geist','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,system-ui,sans-serif" font-size="13.5" font-weight="400" fill="#8a8a90" text-anchor="start">ROC AUC on 200 held-out agent runs (50/50); identical prompt for all, frontier LLMs at their best swept reasoning config. The 1 MB model leads by +0.13 to +0.21 AUC (paired bootstrap, all CIs exclude 0).</text></svg>
